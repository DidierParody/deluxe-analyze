name: Deploy Dispatcher

on:
  push:
    branches:
      - main
    paths:
      - 'dispatcher/**'

permissions:
  id-token: write
  contents: read

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      wif_configured: ${{ steps.check.outputs.wif_configured }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.WIF_PROVIDER }}" ]; then
            echo "wif_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "wif_configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  WIF_PROVIDER not set — skipping dispatcher deploy. Configure GitHub Secrets to enable."
          fi

  deploy:
    needs: check-secrets
    if: needs.check-secrets.outputs.wif_configured == 'true'
    runs-on: ubuntu-latest
    env:
      REGION: us-central1

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push dispatcher image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/deluxe-dispatcher/dispatcher:${{ github.sha }}"
          docker build -t "$IMAGE" dispatcher/
          docker push "$IMAGE"
          docker tag "$IMAGE" "${IMAGE%:*}:latest"
          docker push "${IMAGE%:*}:latest"

      - name: Update Cloud Run Job
        run: |
          gcloud run jobs update dispatcher \
            --image="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/deluxe-dispatcher/dispatcher:${{ github.sha }}" \
            --region="${{ env.REGION }}"
