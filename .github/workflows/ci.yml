name: CI

on:
  pull_request:
    paths:
      - 'etl/**'
      - 'dispatcher/**'
  push:
    branches: [main, development]
    paths:
      - 'etl/**'
      - 'dispatcher/**'
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Lint ETL
        run: ruff check etl/

      - name: Lint Dispatcher
        run: ruff check dispatcher/

      - name: Set up Java 17 for PySpark
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install ETL dev deps
        run: pip install -e "etl/[dev]"

      - name: Test ETL
        run: pytest etl/tests/ -v --tb=short
