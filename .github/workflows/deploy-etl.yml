name: Deploy ETL

on:
  push:
    branches:
      - main
    paths:
      - 'etl/**'

permissions:
  id-token: write
  contents: read

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      wif_configured: ${{ steps.check.outputs.wif_configured }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.WIF_PROVIDER }}" ]; then
            echo "wif_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "wif_configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  WIF_PROVIDER not set — skipping GCS deploy. Configure GitHub Secrets to enable."
          fi

  deploy:
    needs: check-secrets
    if: needs.check-secrets.outputs.wif_configured == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload ETL job to GCS
        run: |
          gsutil cp etl/jobs/main.py gs://${{ secrets.ETL_ARTIFACTS_BUCKET }}/jobs/main.py
          cd etl && zip -r /tmp/etl-deps.zip etl/ && cd ..
          gsutil cp /tmp/etl-deps.zip gs://${{ secrets.ETL_ARTIFACTS_BUCKET }}/deps/etl-deps.zip
