name: Terraform Infra

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.7.5'

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      wif_configured: ${{ steps.check.outputs.wif_configured }}
    steps:
      - name: Check WIF secrets
        id: check
        env:
          WIF_PROVIDER: ${{ secrets.WIF_PROVIDER }}
        run: |
          if [[ -n "$WIF_PROVIDER" ]]; then
            echo "wif_configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "wif_configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::WIF_PROVIDER secret not set. Configure GitHub Secrets after first terraform apply. Skipping Terraform steps."
          fi

  terraform:
    needs: check-secrets
    if: needs.check-secrets.outputs.wif_configured == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Generate terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          project_id         = "${{ secrets.GCP_PROJECT }}"
          region             = "us-central1"
          zone               = "us-central1-a"
          github_repo        = "DidierParody/deluxe-analyze"
          neo4j_machine_type = "e2-medium"
          neo4j_disk_size_gb = 50
          allowed_neo4j_ips  = []
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -var-file=terraform.tfvars
        continue-on-error: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: "${{ steps.plan.outputs.stdout }}"
        with:
          script: |
            const plan = process.env.PLAN || '(no output)';
            const output = `#### Terraform Plan 📋\n\`\`\`\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var-file=terraform.tfvars
