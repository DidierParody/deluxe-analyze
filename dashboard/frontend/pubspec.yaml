name: deluxe_dashboard
description: "Sales dashboard for the deluxe nightclub, powered by Neo4j."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  fl_chart: ^0.66.0
  syncfusion_flutter_treemap: ^24.1.41
  go_router: ^13.0.0
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
