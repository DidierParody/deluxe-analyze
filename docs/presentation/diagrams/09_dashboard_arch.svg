<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0c100e"/><stop offset="100%" stop-color="#050605"/></linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#34d399"/></marker>
  </defs>
  <rect width="1200" height="600" fill="#050605"/>

  <text x="600" y="40" fill="#fff" font-size="22" font-weight="800" text-anchor="middle">Dashboard · 3 capas con contrato HTTP / X-API-Key</text>

  <!-- Flutter -->
  <rect x="60" y="100" width="320" height="420" rx="20" fill="url(#cardBg)" stroke="#374151" stroke-width="1.5"/>
  <text x="80" y="135" fill="#9ca3af" font-size="12" font-weight="700" letter-spacing="2">CLIENT</text>
  <text x="80" y="165" fill="#fff" font-size="22" font-weight="800">Flutter App</text>
  <text x="80" y="187" fill="#cbd5d1" font-size="12">Android APK · Web build</text>

  <g transform="translate(80,220)" font-size="12" fill="#d1d5db">
    <text y="0" font-weight="700" fill="#34d399">PANTALLAS (6)</text>
    <text y="20">• Home</text>
    <text y="38">• Alcance promoción (Q1)</text>
    <text y="56">• Top influyentes (Q2)</text>
    <text y="74">• Evento recomendado (Q3)</text>
    <text y="92">• Comunidades (Q4)</text>
    <text y="110">• Brokers (Q5)</text>

    <text y="148" font-weight="700" fill="#34d399">STACK</text>
    <text y="168">• Material 3 · Inter</text>
    <text y="186">• go_router · dio</text>
    <text y="204">• fl_chart · syncfusion_treemap</text>
    <text y="222">• flutter_dotenv</text>

    <text y="260" font-weight="700" fill="#34d399">RELEASE</text>
    <text y="280">APK 48 MB</text>
  </g>

  <!-- Backend -->
  <rect x="440" y="100" width="320" height="420" rx="20" fill="url(#brand)" opacity="0.10"/>
  <rect x="440" y="100" width="320" height="420" rx="20" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <text x="460" y="135" fill="#34d399" font-size="12" font-weight="700" letter-spacing="2">BACKEND</text>
  <text x="460" y="165" fill="#fff" font-size="22" font-weight="800">FastAPI</text>
  <text x="460" y="187" fill="#cbd5d1" font-size="12">Cloud Run Service · Python 3.11</text>

  <g transform="translate(460,220)" font-size="11" fill="#d1d5db">
    <text y="0" font-weight="700" fill="#34d399">ENDPOINTS (7)</text>
    <text y="20">GET /health</text>
    <text y="36">GET /users</text>
    <text y="52">GET /promo-reach/{id}</text>
    <text y="68">GET /influencers</text>
    <text y="84">GET /event-recommendations/{id}</text>
    <text y="100">GET /communities</text>
    <text y="116">GET /brokers</text>

    <text y="148" font-weight="700" fill="#34d399">FEATURES</text>
    <text y="168">• X-API-Key auth (Secret Manager)</text>
    <text y="186">• Cache TTL 5min (GDS heavy)</text>
    <text y="204">• Direct VPC egress → Neo4j</text>
    <text y="222">• 9 tests / ruff clean</text>

    <text y="260" font-weight="700" fill="#34d399">DEPLOY</text>
    <text y="280">min=1, max=3, CPU 1, 512Mi</text>
  </g>

  <!-- Neo4j -->
  <rect x="820" y="100" width="320" height="420" rx="20" fill="url(#brand)" opacity="0.18"/>
  <rect x="820" y="100" width="320" height="420" rx="20" fill="none" stroke="#10b981" stroke-width="1.5"/>
  <text x="840" y="135" fill="#34d399" font-size="12" font-weight="700" letter-spacing="2">DATA</text>
  <text x="840" y="165" fill="#fff" font-size="22" font-weight="800">Neo4j 5.26</text>
  <text x="840" y="187" fill="#cbd5d1" font-size="12">Compute Engine VM e2-medium</text>

  <g transform="translate(840,220)" font-size="12" fill="#d1d5db">
    <text y="0" font-weight="700" fill="#34d399">GRAFO</text>
    <text y="20">• 361 Usuarios</text>
    <text y="38">• 35 Eventos · 59 Mesas</text>
    <text y="56">• 41.699 CONOCE_A</text>
    <text y="74">• 2.097 ASISTIO_A</text>

    <text y="110" font-weight="700" fill="#34d399">GDS 2.14</text>
    <text y="130">• PageRank (1s)</text>
    <text y="148">• Louvain (25s cold, cache)</text>
    <text y="166">• Betweenness (3s)</text>
    <text y="184">• k-hop expansion (0.2s)</text>

    <text y="222" font-weight="700" fill="#34d399">CONNECT</text>
    <text y="242">bolt://10.20.20.2:7687</text>
    <text y="260">subnet-graph · firewall whitelist</text>
  </g>

  <!-- arrows -->
  <path d="M380,310 L440,310" stroke="#34d399" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <text x="410" y="295" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">HTTPS</text>
  <text x="410" y="330" fill="#9ca3af" font-size="10" text-anchor="middle">X-API-Key</text>

  <path d="M760,310 L820,310" stroke="#34d399" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <text x="790" y="295" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">Bolt</text>
  <text x="790" y="330" fill="#9ca3af" font-size="10" text-anchor="middle">internal</text>

  <!-- Bottom rationale -->
  <rect x="60" y="540" width="1080" height="44" rx="10" fill="#0c100e" stroke="#374151"/>
  <text x="80" y="568" fill="#9ca3af" font-size="11">Diseño <tspan fill="#34d399" font-weight="700">3 capas</tspan>: el backend encapsula Cypher, evita exponer credenciales al cliente y permite cache. La elección de cada gráfico tiene base en literatura estadística (Cleveland-McGill, Shneiderman, Tufte).</text>
</svg>
