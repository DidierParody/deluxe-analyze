<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Inter, sans-serif">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1f2937"/><stop offset="100%" stop-color="#111827"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#34d399"/></marker>
  </defs>
  <rect width="1200" height="600" fill="#050605"/>

  <!-- deluxe-v2 -->
  <rect x="60" y="80" width="450" height="450" rx="20" fill="url(#g1)" stroke="#374151" stroke-width="2"/>
  <text x="90" y="125" fill="#9ca3af" font-size="13" font-weight="700" letter-spacing="2">AWS · OPERATIONAL</text>
  <text x="90" y="160" fill="#fff" font-size="28" font-weight="800">deluxe-v2</text>
  <text x="90" y="186" fill="#cbd5d1" font-size="13">Sistema agéntico de reservas</text>

  <g transform="translate(90,220)" font-size="13" fill="#d1d5db">
    <text y="0" font-weight="600" fill="#34d399">DOMINIO</text>
    <text y="22">• Tickets, mesas, reservas, eventos</text>
    <text y="42">• Usuarios + Telegram bot</text>
    <text y="62">• Pagos + transacciones</text>
    <text y="100" font-weight="600" fill="#34d399">STACK</text>
    <text y="122">• Postgres RDS (privado)</text>
    <text y="142">• Lambda + DMS replication</text>
    <text y="162">• ECS Fargate</text>
    <text y="200" font-weight="600" fill="#34d399">OPTIMIZA</text>
    <text y="222">consistencia · baja latencia</text>
    <text y="240">transaccional · escritura intensiva</text>
  </g>

  <!-- deluxe-analyze -->
  <rect x="690" y="80" width="450" height="450" rx="20" fill="#0c100e" stroke="#10b981" stroke-width="2"/>
  <text x="720" y="125" fill="#34d399" font-size="13" font-weight="700" letter-spacing="2">GCP · ANALYTICAL</text>
  <text x="720" y="160" fill="#fff" font-size="28" font-weight="800">deluxe-analyze</text>
  <text x="720" y="186" fill="#cbd5d1" font-size="13">Análisis de redes sociales sobre grafo</text>

  <g transform="translate(720,220)" font-size="13" fill="#d1d5db">
    <text y="0" font-weight="600" fill="#34d399">DOMINIO</text>
    <text y="22">• Nodos, relaciones, caminos</text>
    <text y="42">• Comunidades, influencia, brokers</text>
    <text y="62">• Recomendaciones por co-asistencia</text>
    <text y="100" font-weight="600" fill="#34d399">STACK</text>
    <text y="122">• Neo4j 5.26 + GDS 2.14</text>
    <text y="142">• Dataproc Serverless + Cloud Run</text>
    <text y="162">• FastAPI + Flutter (Android)</text>
    <text y="200" font-weight="600" fill="#34d399">OPTIMIZA</text>
    <text y="222">consultas exploratorias · algoritmos</text>
    <text y="240">de grafo · lectura intensiva</text>
  </g>

  <!-- Arrow CDC -->
  <path d="M520,300 L680,300" stroke="#34d399" stroke-width="4" fill="none" marker-end="url(#ar)"/>
  <rect x="540" y="245" width="120" height="50" rx="10" fill="#064e3b" stroke="#10b981"/>
  <text x="600" y="270" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">CDC</text>
  <text x="600" y="287" fill="#6ee7b7" font-size="10" text-anchor="middle">15-min micro-batch</text>
  <text x="600" y="320" fill="#9ca3af" font-size="11" text-anchor="middle">DMS → S3 → Pub/Sub → Dataproc</text>

  <text x="600" y="40" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Dos sistemas hermanos · separación operacional/analítico vía CDC</text>
</svg>
