<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, sans-serif">
  <defs>
    <radialGradient id="usrG" cx="50%" cy="50%"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#047857"/></radialGradient>
    <radialGradient id="evtG" cx="50%" cy="50%"><stop offset="0%" stop-color="#6ee7b7"/><stop offset="100%" stop-color="#059669"/></radialGradient>
    <radialGradient id="mesaG" cx="50%" cy="50%"><stop offset="0%" stop-color="#9ca3af"/><stop offset="100%" stop-color="#4b5563"/></radialGradient>
    <radialGradient id="segG" cx="50%" cy="50%"><stop offset="0%" stop-color="#d1d5db"/><stop offset="100%" stop-color="#6b7280"/></radialGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#34d399"/></marker>
  </defs>
  <rect width="1200" height="700" fill="#050605"/>

  <text x="600" y="40" fill="#fff" font-size="22" font-weight="800" text-anchor="middle">Schema canónico Neo4j · namespacing csv:/v2:</text>

  <!-- Usuario nodes (two: one csv, one v2) -->
  <circle cx="200" cy="300" r="80" fill="url(#usrG)" stroke="#10b981" stroke-width="2"/>
  <text x="200" y="295" fill="#052e1d" font-size="16" font-weight="800" text-anchor="middle">Usuario</text>
  <text x="200" y="315" fill="#064e3b" font-size="12" text-anchor="middle">csv:42</text>

  <circle cx="200" cy="500" r="80" fill="url(#usrG)" stroke="#10b981" stroke-width="2"/>
  <text x="200" y="495" fill="#052e1d" font-size="16" font-weight="800" text-anchor="middle">Usuario</text>
  <text x="200" y="515" fill="#064e3b" font-size="12" text-anchor="middle">v2:100</text>

  <!-- CONOCE_A self loop between users -->
  <path d="M250,355 Q 360,400 250,445" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <rect x="280" y="380" width="120" height="40" rx="8" fill="#0c100e" stroke="#10b981"/>
  <text x="340" y="397" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">CONOCE_A</text>
  <text x="340" y="410" fill="#9ca3af" font-size="9" text-anchor="middle">tie_strength, shared_*</text>

  <!-- Evento node -->
  <circle cx="650" cy="200" r="72" fill="url(#evtG)" stroke="#10b981" stroke-width="2"/>
  <text x="650" y="200" fill="#052e1d" font-size="15" font-weight="800" text-anchor="middle">Evento</text>
  <text x="650" y="220" fill="#064e3b" font-size="11" text-anchor="middle">id, name, event_date</text>

  <!-- Mesa node -->
  <circle cx="650" cy="420" r="72" fill="url(#mesaG)" stroke="#4b5563" stroke-width="2"/>
  <text x="650" y="420" fill="#1f2937" font-size="15" font-weight="800" text-anchor="middle">Mesa</text>
  <text x="650" y="440" fill="#1f2937" font-size="11" text-anchor="middle">id, is_vip, capacity</text>

  <!-- Segmento node -->
  <circle cx="1000" cy="320" r="68" fill="url(#segG)" stroke="#6b7280" stroke-width="2"/>
  <text x="1000" y="320" fill="#1f2937" font-size="15" font-weight="800" text-anchor="middle">Segmento</text>
  <text x="1000" y="338" fill="#1f2937" font-size="11" text-anchor="middle">name (unique)</text>

  <!-- Relations -->
  <!-- ASISTIO_A -->
  <path d="M280,270 L580,210" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <rect x="370" y="215" width="120" height="36" rx="8" fill="#0c100e" stroke="#10b981"/>
  <text x="430" y="232" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">ASISTIO_A</text>
  <text x="430" y="245" fill="#9ca3af" font-size="9" text-anchor="middle">ticket_tier</text>

  <path d="M270,510 L590,440" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- RESERVO -->
  <path d="M280,520 L580,450" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <rect x="370" y="465" width="120" height="36" rx="8" fill="#0c100e" stroke="#10b981"/>
  <text x="430" y="482" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">RESERVO</text>
  <text x="430" y="495" fill="#9ca3af" font-size="9" text-anchor="middle">event_id</text>

  <!-- PERTENECE_A -->
  <path d="M275,320 C 600,300 800,320 940,320" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <rect x="780" y="295" width="130" height="36" rx="8" fill="#0c100e" stroke="#10b981"/>
  <text x="845" y="312" fill="#34d399" font-size="11" font-weight="700" text-anchor="middle">PERTENECE_A</text>
  <text x="845" y="325" fill="#9ca3af" font-size="9" text-anchor="middle">—</text>

  <!-- Legend box -->
  <g transform="translate(60,600)">
    <rect width="1080" height="80" rx="10" fill="#0c100e" stroke="#374151"/>
    <text x="20" y="22" fill="#34d399" font-size="12" font-weight="700">NAMESPACING:</text>
    <text x="135" y="22" fill="#d1d5db" font-size="12">csv:N (datos sintéticos seed) · v2:N (CDC desde deluxe-v2) — ambos coexisten en el mismo grafo sin colisión</text>

    <text x="20" y="48" fill="#34d399" font-size="12" font-weight="700">DERIVACIÓN CONOCE_A:</text>
    <text x="170" y="48" fill="#d1d5db" font-size="12">inferida en Spark — co-attendance + shared VIP events + shared reservations → tie_strength ponderado</text>

    <text x="20" y="68" fill="#34d399" font-size="12" font-weight="700">CONSTRAINTS:</text>
    <text x="115" y="68" fill="#d1d5db" font-size="12">4 UNIQUE — usuario_id_unique, evento_id_unique, mesa_id_unique, segmento_name_unique</text>
  </g>
</svg>
