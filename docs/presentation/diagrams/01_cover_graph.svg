<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#0d1410"/><stop offset="100%" stop-color="#050605"/></radialGradient>
    <radialGradient id="node" cx="50%" cy="50%"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#047857"/></radialGradient>
    <radialGradient id="nodeBig" cx="50%" cy="50%"><stop offset="0%" stop-color="#6ee7b7"/><stop offset="100%" stop-color="#059669"/></radialGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- decorative graph -->
  <g stroke="#10b981" stroke-width="1" opacity="0.45">
    <line x1="300" y1="350" x2="500" y2="220"/>
    <line x1="300" y1="350" x2="450" y2="480"/>
    <line x1="300" y1="350" x2="600" y2="380"/>
    <line x1="500" y1="220" x2="700" y2="160"/>
    <line x1="500" y1="220" x2="600" y2="380"/>
    <line x1="450" y1="480" x2="600" y2="380"/>
    <line x1="450" y1="480" x2="640" y2="540"/>
    <line x1="600" y1="380" x2="800" y2="320"/>
    <line x1="600" y1="380" x2="780" y2="450"/>
    <line x1="700" y1="160" x2="900" y2="200"/>
    <line x1="800" y1="320" x2="900" y2="200"/>
    <line x1="800" y1="320" x2="780" y2="450"/>
    <line x1="780" y1="450" x2="900" y2="510"/>
    <line x1="640" y1="540" x2="780" y2="450"/>
    <line x1="640" y1="540" x2="900" y2="510"/>
    <line x1="900" y1="200" x2="900" y2="510"/>
  </g>

  <g>
    <circle cx="600" cy="380" r="22" fill="url(#nodeBig)"/>
    <circle cx="300" cy="350" r="14" fill="url(#node)"/>
    <circle cx="500" cy="220" r="14" fill="url(#node)"/>
    <circle cx="450" cy="480" r="14" fill="url(#node)"/>
    <circle cx="700" cy="160" r="14" fill="url(#node)"/>
    <circle cx="800" cy="320" r="18" fill="url(#nodeBig)"/>
    <circle cx="780" cy="450" r="14" fill="url(#node)"/>
    <circle cx="900" cy="200" r="14" fill="url(#node)"/>
    <circle cx="900" cy="510" r="14" fill="url(#node)"/>
    <circle cx="640" cy="540" r="14" fill="url(#node)"/>
  </g>

  <text x="600" y="110" fill="#fff" font-size="56" font-weight="800" text-anchor="middle">deluxe-analyze</text>
  <text x="600" y="160" fill="#34d399" font-size="22" font-weight="500" text-anchor="middle">Análisis de redes sociales de clientes nocturnos con Neo4j</text>
  <text x="600" y="630" fill="#9ca3af" font-size="15" text-anchor="middle">De CDC en AWS a insights de venta en tu bolsillo</text>
</svg>
