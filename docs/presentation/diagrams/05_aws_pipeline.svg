<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Inter, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#34d399"/></marker>
  </defs>
  <rect width="1200" height="600" fill="#050605"/>
  <text x="600" y="40" fill="#fff" font-size="22" font-weight="800" text-anchor="middle">Pipeline AWS · DMS → S3 → Lambda → Pub/Sub (GCP)</text>

  <g font-size="13" fill="#d1d5db">
    <g transform="translate(40,100)">
      <rect width="200" height="100" rx="12" fill="#1f2937" stroke="#374151"/>
      <text x="14" y="26" fill="#fff" font-size="14" font-weight="700">RDS Postgres</text>
      <text x="14" y="48" font-size="11" fill="#9ca3af">db.t3.small</text>
      <text x="14" y="68" font-size="11">rds.logical_replication=1</text>
      <text x="14" y="84" font-size="11" fill="#34d399">deluxe-v2 schema</text>
    </g>

    <g transform="translate(280,100)">
      <rect width="200" height="100" rx="12" fill="#1f2937" stroke="#374151"/>
      <text x="14" y="26" fill="#fff" font-size="14" font-weight="700">DMS Replication</text>
      <text x="14" y="48" font-size="11" fill="#9ca3af">dms.t3.micro</text>
      <text x="14" y="68" font-size="11">full-load + cdc</text>
      <text x="14" y="84" font-size="11" fill="#34d399">7 tablas mapeadas</text>
    </g>

    <g transform="translate(520,100)">
      <rect width="200" height="100" rx="12" fill="#1f2937" stroke="#374151"/>
      <text x="14" y="26" fill="#fff" font-size="14" font-weight="700">S3 bucket</text>
      <text x="14" y="48" font-size="11" fill="#9ca3af">deluxe-v2-cdc-out</text>
      <text x="14" y="68" font-size="11">Parquet · schema/table/date</text>
      <text x="14" y="84" font-size="11" fill="#34d399">ObjectCreated trigger</text>
    </g>

    <g transform="translate(760,100)">
      <rect width="200" height="100" rx="12" fill="#1f2937" stroke="#374151"/>
      <text x="14" y="26" fill="#fff" font-size="14" font-weight="700">Lambda</text>
      <text x="14" y="48" font-size="11" fill="#9ca3af">s3_to_pubsub.py</text>
      <text x="14" y="68" font-size="11">Python 3.11 · 128MB</text>
      <text x="14" y="84" font-size="11" fill="#34d399">build msg + publish</text>
    </g>

    <g transform="translate(1000,100)">
      <rect width="170" height="100" rx="12" fill="#0c100e" stroke="#10b981" stroke-width="1.5"/>
      <text x="14" y="26" fill="#34d399" font-size="14" font-weight="700">Pub/Sub (GCP)</text>
      <text x="14" y="48" font-size="11" fill="#9ca3af">cdc-events</text>
      <text x="14" y="68" font-size="11">+ subscription</text>
      <text x="14" y="84" font-size="11" fill="#34d399">+ DLQ</text>
    </g>
  </g>

  <!-- Arrows -->
  <path d="M240,150 L280,150" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#ar)"/>
  <text x="260" y="138" fill="#34d399" font-size="10" text-anchor="middle">WAL</text>

  <path d="M480,150 L520,150" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#ar)"/>
  <text x="500" y="138" fill="#34d399" font-size="10" text-anchor="middle">Parquet</text>

  <path d="M720,150 L760,150" stroke="#34d399" stroke-width="2.5" fill="none" marker-end="url(#ar)"/>
  <text x="740" y="138" fill="#34d399" font-size="10" text-anchor="middle">event</text>

  <path d="M960,150 L1000,150" stroke="#34d399" stroke-width="3" fill="none" marker-end="url(#ar)"/>
  <text x="980" y="138" fill="#34d399" font-size="10" text-anchor="middle">HTTPS</text>

  <!-- Detail boxes below -->
  <g transform="translate(40,280)">
    <rect width="540" height="280" rx="14" fill="#0c100e" stroke="#374151"/>
    <text x="20" y="30" fill="#34d399" font-size="13" font-weight="700">TABLAS REPLICADAS</text>
    <g transform="translate(20,55)" font-size="12" fill="#d1d5db" font-family="ui-monospace,monospace">
      <text y="0">core.users</text>
      <text y="20">core.events</text>
      <text y="40">core.dico_tables</text>
      <text y="60">transactions.reservations</text>
      <text y="80">transactions.orders</text>
      <text y="100">transactions.order_details</text>
      <text y="120">transactions.tickets</text>
      <text y="140">transactions.payments</text>
    </g>
    <text x="20" y="220" fill="#34d399" font-size="13" font-weight="700">MENSAJE PUB/SUB</text>
    <g transform="translate(20,242)" font-size="11" font-family="ui-monospace,monospace" fill="#d1d5db">
      <text y="0">data:       s3://bucket/key</text>
      <text y="16">attributes: {table: "core.users"}</text>
    </g>
  </g>

  <g transform="translate(620,280)">
    <rect width="550" height="280" rx="14" fill="#0c100e" stroke="#10b981" stroke-width="1.5"/>
    <text x="20" y="30" fill="#34d399" font-size="13" font-weight="700">AUTENTICACIÓN CRUZADA CLOUD (SIN KEYS)</text>
    <g transform="translate(20,60)" font-size="12" fill="#d1d5db">
      <text y="0">1. Lambda pide token OIDC al servicio interno AWS</text>
      <text y="20">2. Llama al endpoint federado GCP con ese token</text>
      <text y="40">3. GCP devuelve short-lived credentials para SA</text>
      <text y="60">4. Lambda usa esas credentials para publicar a Pub/Sub</text>
    </g>
    <text x="20" y="160" fill="#34d399" font-size="13" font-weight="700">IAM USER PARA DATAPROC</text>
    <g transform="translate(20,185)" font-size="12" fill="#d1d5db">
      <text y="0">gcp-cdc-reader — read-only sobre el bucket S3 DMS</text>
      <text y="20">HMAC keys → almacenadas en Secret Manager GCP</text>
      <text y="40">Dataproc lee con spark.read.parquet("s3a://...")</text>
    </g>
  </g>
</svg>
