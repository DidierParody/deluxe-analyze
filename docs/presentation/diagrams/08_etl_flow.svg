<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="Inter, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#34d399"/></marker>
  </defs>
  <rect width="1200" height="600" fill="#050605"/>
  <text x="600" y="38" fill="#fff" font-size="22" font-weight="800" text-anchor="middle">ETL PySpark · normaliza → deriva CONOCE_A → carga Neo4j</text>

  <!-- Pipeline horizontal -->
  <g font-size="12" fill="#d1d5db">
    <g transform="translate(40,100)">
      <rect width="200" height="120" rx="12" fill="#0c100e" stroke="#374151"/>
      <text x="14" y="26" fill="#fff" font-size="14" font-weight="700">1. READ</text>
      <text x="14" y="50" font-size="11" fill="#34d399">spark.read.csv()</text>
      <text x="14" y="68" font-size="10">gs://seed/...</text>
      <text x="14" y="88" font-size="11" fill="#34d399">spark.read.parquet()</text>
      <text x="14" y="106" font-size="10">s3a://cdc/... HMAC</text>
    </g>

    <g transform="translate(264,100)">
      <rect width="220" height="120" rx="12" fill="#0c100e" stroke="#374151"/>
      <text x="14" y="26" fill="#fff" font-size="14" font-weight="700">2. NORMALIZE</text>
      <text x="14" y="50" font-size="11" fill="#34d399">from_csv.py</text>
      <text x="14" y="66" font-size="10">prefijo csv:</text>
      <text x="14" y="86" font-size="11" fill="#34d399">from_v2.py</text>
      <text x="14" y="102" font-size="10">prefijo v2:</text>
    </g>

    <g transform="translate(508,100)">
      <rect width="200" height="120" rx="12" fill="#0c100e" stroke="#374151"/>
      <text x="14" y="26" fill="#fff" font-size="14" font-weight="700">3. MERGE</text>
      <text x="14" y="52" font-size="11">merge_canonical()</text>
      <text x="14" y="72" font-size="10" fill="#9ca3af">dedup por id</text>
      <text x="14" y="92" font-size="10" fill="#9ca3af">union ambas fuentes</text>
    </g>

    <g transform="translate(732,100)">
      <rect width="220" height="120" rx="12" fill="#0c100e" stroke="#10b981"/>
      <text x="14" y="26" fill="#fff" font-size="14" font-weight="700">4. DERIVE CONOCE_A</text>
      <text x="14" y="50" font-size="11" fill="#34d399">conoce_a.py</text>
      <text x="14" y="68" font-size="10">co-attendance +</text>
      <text x="14" y="84" font-size="10">shared VIP +</text>
      <text x="14" y="100" font-size="10">shared reservations</text>
    </g>

    <g transform="translate(976,100)">
      <rect width="180" height="120" rx="12" fill="#10b981" opacity="0.15"/>
      <rect width="180" height="120" rx="12" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="14" y="26" fill="#fff" font-size="14" font-weight="700">5. LOAD Neo4j</text>
      <text x="14" y="50" font-size="11" fill="#34d399">Neo4j Spark Conn.</text>
      <text x="14" y="68" font-size="10">MERGE idempotente</text>
      <text x="14" y="88" font-size="10">strategy: keys</text>
      <text x="14" y="106" font-size="10">via Bolt</text>
    </g>
  </g>

  <!-- arrows between stages -->
  <path d="M240,160 L264,160" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M484,160 L508,160" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M708,160 L732,160" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ar)"/>
  <path d="M952,160 L976,160" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#ar)"/>

  <!-- GDS algorithms panel -->
  <g transform="translate(40,270)">
    <rect width="1120" height="290" rx="14" fill="#0c100e" stroke="#10b981" stroke-width="1.5"/>
    <text x="20" y="32" fill="#34d399" font-size="14" font-weight="700">ALGORITMOS GDS APLICADOS · CADA UNO RESPONDE UNA PREGUNTA DE NEGOCIO</text>

    <g transform="translate(20,60)" font-size="12">
      <g><rect width="345" height="100" rx="10" fill="#1f2937"/>
        <text x="14" y="22" fill="#fff" font-weight="700">PageRank · /influencers</text>
        <text x="14" y="44" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">CALL gds.pageRank.stream('socialGraph',</text>
        <text x="14" y="58" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">  {relationshipWeightProperty: 'tie_strength'})</text>
        <text x="14" y="82" fill="#9ca3af" font-size="11">¿Quién es el cliente más influyente?</text></g>

      <g transform="translate(365,0)"><rect width="345" height="100" rx="10" fill="#1f2937"/>
        <text x="14" y="22" fill="#fff" font-weight="700">Louvain · /communities</text>
        <text x="14" y="44" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">CALL gds.louvain.stream('socialGraph')</text>
        <text x="14" y="58" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">YIELD communityId, nodeId</text>
        <text x="14" y="82" fill="#9ca3af" font-size="11">¿Qué grupos siempre se mueven juntos?</text></g>

      <g transform="translate(730,0)"><rect width="345" height="100" rx="10" fill="#1f2937"/>
        <text x="14" y="22" fill="#fff" font-weight="700">Betweenness · /brokers</text>
        <text x="14" y="44" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">CALL gds.betweenness.stream(</text>
        <text x="14" y="58" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">  'socialGraph')</text>
        <text x="14" y="82" fill="#9ca3af" font-size="11">¿Quién conecta grupos distintos?</text></g>

      <g transform="translate(0,120)"><rect width="525" height="100" rx="10" fill="#1f2937"/>
        <text x="14" y="22" fill="#fff" font-weight="700">k-hop expansion · /promo-reach/{id}</text>
        <text x="14" y="44" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">MATCH (u:Usuario {id:$id})-[:CONOCE_A*1..3]-(v)</text>
        <text x="14" y="58" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">RETURN count(DISTINCT v) AS reach</text>
        <text x="14" y="82" fill="#9ca3af" font-size="11">¿A cuántos llega indirectamente una promoción?</text></g>

      <g transform="translate(545,120)"><rect width="530" height="100" rx="10" fill="#1f2937"/>
        <text x="14" y="22" fill="#fff" font-weight="700">Collaborative filtering · /event-recommendations/{id}</text>
        <text x="14" y="44" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">MATCH (u {id:$id})-[r:CONOCE_A]-(f)-[:ASISTIO_A]-&gt;(e)</text>
        <text x="14" y="58" fill="#34d399" font-size="11" font-family="ui-monospace,monospace">WHERE NOT (u)-[:ASISTIO_A]-&gt;(e)  RETURN e, sum(r.tie_strength)</text>
        <text x="14" y="82" fill="#9ca3af" font-size="11">¿Qué evento le recomiendo según sus amigos?</text></g>
    </g>
  </g>
</svg>
